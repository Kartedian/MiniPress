{% extends "index.html" %}

{% block title %}Liste Categorie - MiniPress{% endblock %}

{% block content %}
<div class="section-header">
    <h1>Liste des Catégories</h1>
    {% if isAuthenticated %}
    <a href="{{ url_for('categorie_create') }}" class="btn">+ Créer une nouvelle catégorie</a>
    {% endif %}
</div>

<ul class="item-list">
    {% for categorie in categories %}
    <li><a href="{{ url_for('categorie_detail', {'id': categorie.id})}}">{{ categorie.libelle }}</a></li>
    {% endfor %}
</ul>
{% endblock %}
