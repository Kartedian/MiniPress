{% extends "index.html" %}

{% block title %}Create Categorie - MiniPress{% endblock %}

{% block content %}
<h1>Créer une nouvelle catégorie</h1>
<form method="post" action="{{ url_for('categorie_create')}}">
    <div class="form-group _libelle">
        <label for="libelle">Libelle</label>
        <input type="text" id="libelle" name="libelle" required>
    </div>

    <div class="form-group _description">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="6"></textarea>
    </div>

    <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token }}">
    <div class="form-group">
        <button type="submit" class="btn">Créer la catégorie</button>
    </div>
</form>
{% endblock %}
