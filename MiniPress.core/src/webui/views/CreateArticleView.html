{% extends "index.html" %}

{% block title %}Create Article - MiniPress{% endblock %}

{% block content %}
<h1>Créer un nouvel article</h1>
<form method="post" action="{{ url_for('article_create')}}">
    <div class="form-group _titre">
        <label for="titre">Titre</label>
        <input type="text" id="titre" name="titre" required>
    </div>

    <div class="form-group _resumer">
        <label for="resumer">Résumé</label>
        <textarea id="resumer" name="resumer" rows="4"></textarea>
    </div>

    <div class="form-group _contenue">
        <label for="contenue">Contenu</label>
        <textarea id="contenue" name="contenue" rows="10"></textarea>
    </div>

    <div class="form-group _categorie">
        <label for="categorie">Categorie</label>
        <select id="categorie" name="categorie">
            <option value="">--Sélectionnez une categorie--</option>
            {% for categorie in categories %}
                <option value="{{ categorie.id }}">{{ categorie.libelle }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group _url_image">
        <label for="url_image">URL de l'image de l'article</label>
        <input
            type="url"
            id="url_image"
            name="url_image"
            placeholder="https://exemple.com/photo.jpg"
        >
    </div>

    <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token }}">
    <div class="form-group">
        <button type="submit" class="btn">Créer l'article</button>
    </div>
</form>
{% endblock %}
