{% extends "index.html" %}

{% block title %}Create Article - MiniPress{% endblock %}

{% block content %}
<h1>Créer une nouvelle Article</h1>
    <form method="post" action="{{ url_for('article_create')}}" enctype="multipart/form-data">
        <div class="_titre">
            <label for="titre">Titre</label>
            <input type="text" id="titre" name="titre" required>
        </div>

        <div class="_resumer">
            <label for="resumer">Resumer</label>
            <textarea id="resumer" name="resumer" rows="10"></textarea>
        </div>

        <div class="_contenue">
            <label for="contenue">Contenue</label>
            <textarea id="contenue" name="contenue" rows="10"></textarea>
        </div>

        <div class="_categorie">
            <label for="categorie">Categorie</label>
            <select id="categorie" name="categorie">
                <option value="">--Sélectionnez une categorie--</option>
                {% for categorie in categories %}
                    <option value="{{ categorie.id }}">{{ categorie.libelle }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="_image_file">
            <label for="image_file">Choisir une image pour l'article :</label>
            <input 
                type="file" 
                id="image_file" 
                name="image_file" 
                accept="image/png, image/jpeg, image/webp"
                class="form-control"
            >
        </div>

        <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token }}">
        <div>
            <button type="submit">Créer l'article</button>
        </div>
    </form>
{% endblock %}
